# ───────────────────────────────────────────────────────────────
# infra/nginx/nginx.conf — Reverse proxy for Cyprus Geo-Social TMA
#
# Routes:
#   /            → frontend (static)
#   /api/tiles/  → backend (MVT tiles, cached 7 days)
#   /api/        → backend (Fastify REST)
#   /ws/         → backend (Socket.IO WebSocket upgrade)
#   /healthz     → backend (healthcheck)
# ───────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/x-protobuf;

    # ── Tile cache (7 days, 1 GB max) ────────────────────────
    proxy_cache_path /var/cache/nginx/tiles
                     levels=1:2
                     keys_zone=tile_cache:10m
                     max_size=1g
                     inactive=7d
                     use_temp_path=off;

    # ── Upstream definitions ─────────────────────────────────
    upstream backend {
        server backend:3000;
    }

    upstream frontend {
        server frontend:80;
    }

    # ── WebSocket upgrade map ────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # ── Backend: MVT Tiles (cached) ──────────────────────
        location /api/tiles/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Cache MVT tiles for 7 days
            proxy_cache            tile_cache;
            proxy_cache_valid      200 7d;
            proxy_cache_valid      204 1h;
            proxy_cache_valid      any 1m;
            proxy_cache_key        "$request_uri";
            proxy_cache_use_stale  error timeout updating;
            add_header             X-Cache-Status $upstream_cache_status;
        }

        # ── Backend: REST API ────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Backend: healthcheck ─────────────────────────────
        location = /healthz {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── Backend: Socket.IO WebSocket ─────────────────────
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket timeouts
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }

        # ── Frontend: static files (catch-all) ───────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }
    }
}
