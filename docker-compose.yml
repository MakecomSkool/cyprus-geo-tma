# ───────────────────────────────────────────────────────────────
# Docker Compose — Cyprus Geo-Social TMA
#
# Services:
#   db         PostGIS 15 (persistent volume)
#   migrate    One-shot: migrations + seed data
#   backend    Fastify 5 + Socket.IO 4
#   frontend   React (Vite build → Nginx)
#   nginx      Reverse proxy (REST, WebSocket, static)
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f
#   docker compose down
# ───────────────────────────────────────────────────────────────

services:
  # ── Database ─────────────────────────────────────────────────
  db:
    image: postgis/postgis:15-3.4
    container_name: cyprus_geo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cyprus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cyprus_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-cyprus_geo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cyprus} -d ${POSTGRES_DB:-cyprus_geo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Migrations + Seed (one-shot) ─────────────────────────────
  migrate:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: cyprus_geo_migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-cyprus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cyprus_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-cyprus_geo}
    volumes:
      - ./data:/data:ro
    restart: "no"

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: cyprus_geo_backend
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      BACKEND_PORT: 3000
      BACKEND_HOST: "0.0.0.0"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-cyprus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cyprus_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-cyprus_geo}
      DATABASE_URL: postgresql://${POSTGRES_USER:-cyprus}:${POSTGRES_PASSWORD:-cyprus_dev_2026}@db:5432/${POSTGRES_DB:-cyprus_geo}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-YOUR_BOT_TOKEN_HERE}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend (static) ───────────────────────────────────────
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
    container_name: cyprus_geo_frontend
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: cyprus_geo_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
